const { useState, useEffect } = React;

const NAV_ITEMS = [
  { label: "Overview", id: "overview" },
  { label: "Platforms", id: "platforms" },
  { label: "Programs", id: "programs" },
  { label: "M&A", id: "mna" },
  { label: "Scorecard", id: "scorecard" },
  { label: "Takeaways", id: "takeaways" },
];

function scrollToSection(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
}

function Navbar() {
  const [scrolled, setScrolled] = useState(false);
  const [active, setActive] = useState("");
  const [menuOpen, setMenuOpen] = useState(false);

  useEffect(() => {
    const onScroll = () => {
      setScrolled(window.scrollY > 40);
      const ids = NAV_ITEMS.map(n => n.id);
      for (let i = ids.length - 1; i >= 0; i--) {
        const el = document.getElementById(ids[i]);
        if (el && el.getBoundingClientRect().top <= 120) { setActive(ids[i]); break; }
      }
    };
    window.addEventListener("scroll", onScroll);
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  return (
    <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled ? "bg-white/95 backdrop-blur border-b border-stone-200 shadow-sm" : "bg-transparent"}`}>
      <div className="max-w-5xl mx-auto px-6 h-14 flex items-center justify-between">
        <button onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })} className="flex items-center gap-2.5">
          <div className="w-7 h-7 rounded bg-blue-700 flex items-center justify-center">
            <span className="text-white font-bold text-xs">Φ</span>
          </div>
          <span className="font-semibold text-stone-900 text-sm">Phenomics</span>
          <span className="hidden sm:block text-stone-400 text-xs ml-1">· Field Intelligence</span>
        </button>
        <div className="hidden md:flex items-center gap-1">
          {NAV_ITEMS.map(n => (
            <button key={n.id} onClick={() => scrollToSection(n.id)}
              className={`px-3 py-1.5 rounded text-xs font-medium transition-colors ${active === n.id ? "bg-blue-50 text-blue-700" : "text-stone-500 hover:text-stone-800 hover:bg-stone-100"}`}>
              {n.label}
            </button>
          ))}
        </div>
        <button className="md:hidden text-stone-500 hover:text-stone-800" onClick={() => setMenuOpen(!menuOpen)}>
          <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
            {menuOpen ? <path d="M6 18L18 6M6 6l12 12"/> : <path d="M3 12h18M3 6h18M3 18h18"/>}
          </svg>
        </button>
      </div>
      {menuOpen && (
        <div className="md:hidden bg-white border-t border-stone-100 px-6 py-3 flex flex-col gap-1">
          {NAV_ITEMS.map(n => (
            <button key={n.id} onClick={() => { scrollToSection(n.id); setMenuOpen(false); }}
              className="text-left px-3 py-2 rounded text-sm text-stone-600 hover:bg-stone-50">{n.label}</button>
          ))}
        </div>
      )}
    </nav>
  );
}

            <span className="w-1.5 h-1.5 rounded-full bg-blue-500 inline-block" />

          In Vivo CAR T Cells:<br />

function KpiStrip() {
  const stats = [
    { num: "8+", label: "Active clinical programs worldwide" },
    { num: "100%", label: "MRD-neg rate, Kelonia KLN-1010 (n=4, ASH 2025)" },
    { num: "~$6B", label: "M&A + financing since 2024" },
    { num: "~10×", label: "Projected cost reduction vs. ex vivo" },
  ];
  return (
    <div className="max-w-3xl mx-auto px-6 mb-2">

            <div className="text-2xl sm:text-3xl font-bold text-stone-900 tracking-tight leading-none">{s.num}</div>

function SectionRule() { return <hr className="border-stone-100 my-12" />; }

function Pullquote({ quote, cite }) {

const CALLOUT_CFG = {
  green: { bg: "bg-emerald-50", border: "#059669", label: "text-emerald-600", body: "text-emerald-800" },

function Callout({ color, label, children }) {
  const c = CALLOUT_CFG[color];

    <div className={`rounded-r-lg px-5 py-4 my-6 border-l-[3px] ${c.bg}`} style={{ borderLeftColor: c.border }}>

function Overview() {
  return (
    <section id="overview" className="max-w-3xl mx-auto px-6 pt-10">
      <p className="font-serif text-xl text-stone-800 italic leading-relaxed mb-6">
        Something extraordinary happened at ASH 2025 in Orlando. An Australian scientist walked to a podium and described an infusion that generates a cancer treatment <em>inside the patient's own body</em> — no cell extraction, no factory, no weeks of waiting. And the cancer disappeared.
      </p>
      <p className="text-[18px] text-stone-600 leading-loose mb-5">
        Traditional CAR T cells require apheresis to harvest a patient's T cells, weeks of GMP manufacturing to engineer and expand them, lymphodepleting chemotherapy to prepare the body, and then infusion — a process costing $400,000–$500,000 per patient, taking 4–6 weeks, and accessible to <strong className="text-stone-800 font-semibold">fewer than 60% of referred patients</strong>. In vivo CAR T eliminates that entire chain by delivering the CAR transgene directly into circulating T cells <em>inside the body</em>, using either viral vectors or lipid nanoparticles.
      </p>
      <KpiStrip />
      <SectionRule />
      <SectionHead>Why now? The access crisis that forced innovation</SectionHead>
      <p className="text-[18px] text-stone-600 leading-loose mb-5">
        A 2024 McKesson report found that millions of Americans in rural areas live in "CAR T deserts" — more than two-thirds of oncologists lack nearby access to administer the therapy. A Memorial Sloan Kettering study found that Black patients were statistically less likely to receive CAR T, exposing a layer of structural inequity beyond mere geography.
      </p>
      <p className="text-[18px] text-stone-600 leading-loose mb-5">
        Even for patients who can access major academic centers, the manufacturing bottleneck is ruthless. Disease progresses while the factory runs. Some patients deteriorate past eligibility before their cells return.
      </p>
      <Pullquote
        quote="By engineering immune cells directly within the body, the patient becomes their own factory. It dramatically accelerates the process and is significantly more cost-effective."
        cite="— Jean-Pierre Latere, PhD, CEO, EsoBiotec (now AstraZeneca)"
      />
      <p className="text-[18px] text-stone-600 leading-loose">
        In vivo CAR T was proposed as the solution more than a decade ago. The science took time to catch up. Now — with two independent programs showing complete responses in humans, three mega-acquisitions, and eight programs in or entering clinical trials — the field has crossed a threshold.
      </p>
    </section>
  );
}

      <SectionHead>The delivery platform landscape: four distinct bets</SectionHead>

        There is no single "in vivo CAR T." Four distinct technological approaches are competing, with very different risk and reward profiles.
      </p>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <PlatformCard num="①" title="Lentiviral vectors (LVV)"
          desc="Stable, durable CAR expression via genomic integration. T-cell selectivity achieved through anti-CD3 or anti-CD8 nanobody-modified envelopes, or fusogen-based targeting. The approach currently generating the most convincing clinical data."
          tags={["Durable expression","Stable integration","Single dose"]}
          players="Key players: Kelonia, EsoBiotec/AZ, Umoja, Interius, Genocury, Vyriad" />
        <PlatformCard num="②" title="LNP-mRNA (non-viral)"
          desc="Transient CAR expression lasting hours to days. Targeted LNPs use anti-CD4/CD8/CD5 antibody conjugation for T-cell selectivity. Tunable, repeatable dosing model; no insertional risk; lower CRS profile expected."
          tags={["Reversible expression","Repeat dosing","No integration"]}
          players="Key players: Capstan/AbbVie, Orna/Lilly, Myeloid/CREATE, Sanofi" />
        <PlatformCard num="③" title="CRISPR / AAV HDR (next-gen)"
          desc="Site-specific integration at the TRAC locus via CRISPR-Cas9 + AAV HDR. Avoids random integration; enables physiological CAR expression. A Nature paper (March 2026) demonstrated in vivo TRAC-targeted CAR generation in mice."

        <PlatformCard num="④" title="Circular RNA / oRNA"
          desc="Orna Therapeutics' proprietary oRNA platform delivers circular RNA payloads with improved stability versus linear mRNA. Their panCAR concept targets T cells, NK cells, and myeloid cells simultaneously. Acquired by Eli Lilly for up to $2.4B in February 2026."
          tags={["Circular RNA","panCAR multi-cell","Preclinical"]} />
      </div>
    </section>
  );
}

function FailureSection() {
  return (
    <section className="max-w-3xl mx-auto px-6">
      <SectionRule />
      <SectionHead>Failure stories: what went wrong</SectionHead>
      <Callout color="red" label="🔴 Cautionary tale — Sana Biotechnology (SG299)">
        Sana raised $676M in the biggest biotech IPO of 2021 on the promise of its in vivo CAR-T fusogen platform. The program never reached clinical trials, repeatedly slipping from 2022 to 2023. In October 2023, Sana shelved SG299 entirely, laid off 29% of its staff, and pivoted to conventional allogeneic CAR-T. The stock fell approximately <strong>90% from its IPO price</strong>. Key failure factors: insufficient in vivo T-cell transduction efficiency, inability to achieve clinical-grade manufacturing, and severe timeline overconfidence.
      </Callout>
      <Callout color="amber" label="⚠️ Ongoing concern — Off-target transduction">
        In 2018, during ex vivo CAR-T production, a CAR gene was accidentally introduced into malignant B cells — causing antigen masking and relapse. In vivo delivery amplifies this risk because vectors circulate systemically. EsoBiotec addresses this with a T cell–specific synthetic promoter; however, validated safeguards and long-term genotoxicity surveillance remain active priorities across the field.
      </Callout>
      <Callout color="amber" label="⚠️ Critical unknown — Durability">
        The most important open question: how long will in vivo–generated CAR-T cells persist? Kelonia's 5-month and EsoBiotec's 3-month data are promising but insufficient to establish equivalence with ex vivo products, which can yield multi-year remissions. Durability is the <strong>single biggest binary risk factor for the entire field</strong>.
      </Callout>
    </section>
  );
}
